
# Source size (src/*): ~353.1 KB
[build-system]
  requires = ["hatchling"]
  build-backend = "hatchling.build"

[project]
  name = "exonware-xwaction"
  dynamic = ["version"]
  description = "Action-based workflow and automation library"
  readme = "README.md"
  requires-python = ">=3.12"
  keywords = ["action", "workflow", "automation", "execution", "tasks", "exonware"]
  classifiers = []
  dependencies = []
  authors = [{ name = "eXonware Backend Team" }]

  [project.license]
    text = "MIT"

  [project.optional-dependencies]
    lazy = []
    dev = [
      "black>=23.0.0",
      "isort>=5.12.0",
      "mypy>=1.0.0",
      "pytest>=7.0.0",
      "pytest-asyncio>=0.21.0",
      "pytest-cov>=4.0.0",
    ]
    full = ["prefect", "unidecode"]

  [project.urls]
    Homepage = "https://exonware.com"
    Repository = "https://github.com/exonware/xwaction"
    Documentation = "https://github.com/exonware/xwaction#readme"
    Subtree = "https://github.com/exonware/xwaction.git"

[tool]

  [tool.black]
    line-length = 88
    target-version = ["py312"]

  [tool.isort]
    profile = "black"
    line_length = 88

  [tool.mypy]
    python_version = "3.12"
    strict = true
    warn_return_any = true
    warn_unused_configs = true
    disallow_untyped_defs = true
    disallow_any_generics = true
    disallow_untyped_calls = true
    disallow_incomplete_defs = true
    check_untyped_defs = true
    disallow_untyped_decorators = true
    no_implicit_optional = true
    warn_redundant_casts = true
    warn_unused_ignores = true
    warn_no_return = true
    warn_unreachable = true

  [tool.pytest]

    [tool.pytest.ini_options]
      testpaths = ["tests"]
      python_files = ["test_*.py"]
      python_classes = ["Test*"]
      python_functions = ["test_*"]
      addopts = "-v --tb=short"
      markers = []

  [tool.hatch]

    [tool.hatch.version]
      path = "src/exonware/xwaction/version.py"

    [tool.hatch.build]

      [tool.hatch.build.targets]

        [tool.hatch.build.targets.wheel]
          packages = ["src/exonware"]
          py-modules = ["src/xwaction"]

        [tool.hatch.build.targets.sdist]
          include = ["/src", "/tests", "/README.md", "/.github"]
