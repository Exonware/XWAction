# Source size (src/*): ~353.0 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwaction"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwaction - provides 'import xwaction' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "action",
    "workflow",
    "automation",
    "execution",
    "tasks",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwaction",
]
exonware-xwdata = "514480 ; 0.49 MB"
exonware-xwschema = "359128 ; 0.34 MB"
authors = []
"{ name" = "eXonware Backend Team"

[project.license]
text = "MIT"

[project.optional-dependencies]
lazy = [
    "exonware-xwaction[lazy]",
]
"exonware-xwdata[lazy]" = [
    "exonware-xwaction[exonware-xwdata[lazy]]",
]
exonware-xwlazy = [
    "exonware-xwaction[exonware-xwlazy]",
]
"exonware-xwschema[lazy]" = [
    "exonware-xwaction[exonware-xwschema[lazy]]",
]
dev = [
    "exonware-xwaction[dev]",
]
"black>" = [
    "exonware-xwaction[black>]",
]
"exonware-xwdata[dev]" = [
    "exonware-xwaction[exonware-xwdata[dev]]",
]
"exonware-xwschema[dev]" = [
    "exonware-xwaction[exonware-xwschema[dev]]",
]
"isort>" = [
    "exonware-xwaction[isort>]",
]
"mypy>" = [
    "exonware-xwaction[mypy>]",
]
"pytest>" = [
    "exonware-xwaction[pytest>]",
]
"pytest-asyncio>" = [
    "exonware-xwaction[pytest-asyncio>]",
]
"pytest-cov>" = [
    "exonware-xwaction[pytest-cov>]",
]
full = [
    "exonware-xwaction[full]",
]
brotli = [
    "exonware-xwaction[brotli]",
]
cachebox = [
    "exonware-xwaction[cachebox]",
]
"exonware-xwdata[full]" = [
    "exonware-xwaction[exonware-xwdata[full]]",
]
"exonware-xwschema[full]" = [
    "exonware-xwaction[exonware-xwschema[full]]",
]
hyperlight_hyperjson = [
    "exonware-xwaction[hyperlight_hyperjson]",
]
pylru = [
    "exonware-xwaction[pylru]",
]
zstandard = [
    "exonware-xwaction[zstandard]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwaction"
Documentation = "https://github.com/exonware/xwaction#readme"
Subtree = "https://github.com/exonware/xwaction.git"

[tool.black]
line-length = 88
target-version = [
    "py38",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "0.9.0.1"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-v --tb=short"
markers = []

[tool.hatch.version]
path = "src/exonware/xwaction/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwaction_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
