[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwaction_core: Core functionality and integration tests
    xwaction_unit: Unit tests for individual components
    xwaction_integration: Integration tests across modules
    xwaction_advance: Advance quality tests (v1.0.0+)
    xwaction_security: Security excellence tests (Priority #1)
    xwaction_usability: Usability excellence tests (Priority #2)
    xwaction_maintainability: Maintainability excellence tests (Priority #3)
    xwaction_performance: Performance excellence tests (Priority #4)
    xwaction_extensibility: Extensibility excellence tests (Priority #5)

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -x

